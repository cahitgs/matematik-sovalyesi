<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Matematik Şövalyesi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #1a0e0a;
      overflow: hidden;
      font-family: 'Trebuchet MS', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #game-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #1a0e0a;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* Touch kontrolleri */
    .touch-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      pointer-events: none;
      display: none;
      z-index: 1000;
      padding: 18px;
    }
    .touch-controls.show { display: flex; justify-content: space-between; align-items: flex-end; }
    .touch-pad { display: flex; gap: 14px; pointer-events: auto; }
    .touch-btn {
      width: 72px; height: 72px;
      background: rgba(255, 220, 130, 0.85);
      border: 4px solid #6b3a1a;
      border-radius: 50%;
      color: #2a1605;
      font-size: 30px;
      font-weight: 900;
      box-shadow: 0 4px 0 #6b3a1a, 0 8px 18px rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto;
      touch-action: none;
    }
    .touch-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #6b3a1a, 0 4px 10px rgba(0,0,0,0.45);
    }
    .touch-btn.attack { background: rgba(220, 70, 60, 0.92); color: #fff; }
    .touch-btn.jump  { background: rgba(110, 200, 110, 0.92); color: #fff; }

    @media (pointer: coarse) {
      .touch-controls { display: flex; justify-content: space-between; align-items: flex-end; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div class="touch-controls" id="touch-controls">
    <div class="touch-pad">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-right">▶</button>
    </div>
    <div class="touch-pad">
      <button class="touch-btn jump" id="btn-jump">↑</button>
      <button class="touch-btn attack" id="btn-attack">⚔</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=5"></script>
</body>
</html>
